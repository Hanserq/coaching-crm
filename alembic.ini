# Alembic configuration — pre-configured for Coaching Center CRM
# Do NOT set sqlalchemy.url here; we read it from the DATABASE_URL env var in env.py

[alembic]
# Path to migration scripts (relative to this file)
script_location = alembic

# Template used when generating new migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Truncate revision identifiers
truncate_slug_length = 40

# Timezone used in file template
timezone = UTC

# Max length of the "slug" portion of a revision filename
prepend_rev = false

# sys.path to add — leave empty, manage via PYTHONPATH
prepend_sys_path = .

# Logging configuration --------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
